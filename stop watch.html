<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One‑Stop Stopwatch</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
            margin: 0;
        }

        .stopwatch-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 3.5rem;
            padding: 3rem 2.5rem 2.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
            width: 100%;
            max-width: 600px;
            transition: 0.3s;
            text-align: center;
        }

        h1 {
            font-weight: 400;
            font-size: 1.3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 1.8rem;
            word-spacing: 6px;
        }

        .time-display {
            background: #0b1120;
            border-radius: 4rem;
            padding: 1.2rem 0.5rem;
            margin-bottom: 2.5rem;
            box-shadow: inset 0 8px 12px rgba(0, 0, 0, 0.6), 0 0 0 1px #2d3a52;
        }

        .time {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: clamp(3.4rem, 15vw, 5.6rem);
            font-weight: 600;
            letter-spacing: 5px;
            color: #e2e8f0;
            text-shadow: 0 0 12px #38bdf8, 0 0 30px #0ea5e9;
            background: linear-gradient(135deg, #f0f9ff 0%, #b9e6ff 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            padding: 0 0.25rem;
        }

        .milliseconds {
            font-size: 0.5em;
            font-weight: 400;
            color: #94a3b8;
            text-shadow: none;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #b9c7dc;
            margin-left: 0.1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }

        .btn {
            background: #1e2a3a;
            border: none;
            border-radius: 60px;
            padding: 0.9rem 2.2rem;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #e6edf5;
            cursor: pointer;
            box-shadow: 0 6px 0 #0b1119, 0 10px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.08s ease-in;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 110px;
            flex: 1 0 auto;
            border: 1px solid #334155;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0b1119, 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .btn:disabled {
            opacity: 0.45;
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0b1119;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-start {
            background: #0b5e3c;
            border-color: #2b9e6b;
            color: #e6faf0;
            box-shadow: 0 6px 0 #06321f, 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-start:active {
            background: #0d6e46;
        }

        .btn-stop {
            background: #7f2d2d;
            border-color: #b54a4a;
            color: #ffe2e2;
            box-shadow: 0 6px 0 #4f1b1b, 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-stop:active {
            background: #963838;
        }

        .btn-reset {
            background: #2a3348;
            border-color: #4b5a78;
            color: #d1dbe9;
            box-shadow: 0 6px 0 #141b2b, 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-reset:active {
            background: #384566;
        }

        .btn-lap {
            background: #3d3a5c;
            border-color: #6a64a0;
            color: #e3defa;
            box-shadow: 0 6px 0 #252243, 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-lap:active {
            background: #514d7a;
        }

        .lap-container {
            background: #0f172a80;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2.5rem;
            padding: 1.2rem 1rem 0.8rem;
            margin-top: 1.8rem;
            border: 1px solid #33415560;
            max-height: 220px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #4b5a78 #1e2a3a;
        }

        .lap-container::-webkit-scrollbar {
            width: 5px;
        }

        .lap-container::-webkit-scrollbar-track {
            background: #1e2a3a;
            border-radius: 10px;
        }

        .lap-container::-webkit-scrollbar-thumb {
            background: #4b5a78;
            border-radius: 10px;
        }

        .lap-header {
            display: flex;
            justify-content: space-between;
            padding: 0 0.5rem 0.6rem;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #8193b0;
            border-bottom: 1px dashed #334155;
            margin-bottom: 0.6rem;
        }

        .lap-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0.5rem;
            font-size: 1.1rem;
            font-weight: 400;
            color: #cbd5e1;
            border-bottom: 1px solid #1f2a3d;
            font-family: 'JetBrains Mono', monospace;
        }

        .lap-item:last-child {
            border-bottom: none;
        }

        .lap-number {
            color: #8193b0;
            font-size: 0.9rem;
        }

        .lap-time {
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        .empty-lap {
            color: #4b5a78;
            text-align: center;
            padding: 0.8rem 0;
            font-style: italic;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .stopwatch-card {
                padding: 2rem 1.2rem 1.8rem;
                border-radius: 2.5rem;
            }

            .btn {
                min-width: 80px;
                padding: 0.7rem 1rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="stopwatch-card">
        <h1>⚡ one‑stop watch</h1>

        <div class="time-display">
            <span class="time" id="display">
                00:00:00<span class="milliseconds">.00</span>
            </span>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">▶ Start</button>
            <button class="btn btn-stop" id="stopBtn" disabled>⏹ Stop</button>
            <button class="btn btn-reset" id="resetBtn">↺ Reset</button>
            <button class="btn btn-lap" id="lapBtn" disabled>⏱ Lap</button>
        </div>

        <div class="lap-container">
            <div class="lap-header">
                <span>LAP</span>
                <span>TIME</span>
            </div>
            <ul class="lap-list" id="lapList">
                <li class="empty-lap">— no laps recorded —</li>
            </ul>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM elements
            const displayEl = document.getElementById('display');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const resetBtn = document.getElementById('resetBtn');
            const lapBtn = document.getElementById('lapBtn');
            const lapList = document.getElementById('lapList');

            // Stopwatch variables
            let startTime = 0;
            let elapsedTime = 0;
            let running = false;
            let timerInterval = null;
            let lapCount = 0;
            let lastLapTime = 0;

            // Format time for display (with HTML for milliseconds)
            function formatTime(ms) {
                if (ms < 0) ms = 0;
                const hours = Math.floor(ms / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);
                const centiseconds = Math.floor((ms % 1000) / 10);

                const pad = (n) => String(n).padStart(2, '0');
                return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}<span class="milliseconds">.${String(centiseconds).padStart(2, '0')}</span>`;
            }

            // Format time for lap display (plain text)
            function formatLapTime(ms) {
                if (ms < 0) ms = 0;
                const hours = Math.floor(ms / 3600000);
                const minutes = Math.floor((ms % 3600000) / 60000);
                const seconds = Math.floor((ms % 60000) / 1000);
                const centiseconds = Math.floor((ms % 1000) / 10);

                const pad = (n) => String(n).padStart(2, '0');
                return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}.${String(centiseconds).padStart(2, '0')}`;
            }

            // Get current elapsed time
            function getCurrentTime() {
                if (running) {
                    return elapsedTime + (Date.now() - startTime);
                }
                return elapsedTime;
            }

            // Update display
            function updateDisplay() {
                displayEl.innerHTML = formatTime(getCurrentTime());
            }

            // Main timer loop
            function timerLoop() {
                updateDisplay();
            }

            // Start stopwatch
            function startStopwatch() {
                if (running) return;
                
                startTime = Date.now();
                running = true;
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                lapBtn.disabled = false;
                
                // Clear any existing interval
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                
                // Update every 10ms for smooth display
                timerInterval = setInterval(timerLoop, 10);
                updateDisplay();
            }

            // Stop/pause stopwatch
            function stopStopwatch() {
                if (!running) return;
                
                // Add the elapsed time since last start
                elapsedTime += Date.now() - startTime;
                running = false;
                
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                
                startBtn.disabled = false;
                stopBtn.disabled = true;
                lapBtn.disabled = true;
                
                updateDisplay();
            }

            // Reset stopwatch
            function resetStopwatch() {
                // Stop if running
                if (running) {
                    running = false;
                    if (timerInterval) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                }
                
                // Reset all values
                startTime = 0;
                elapsedTime = 0;
                lastLapTime = 0;
                lapCount = 0;
                
                // Clear laps from storage
                localStorage.removeItem('stopwatch_laps');
                
                // Update UI
                updateDisplay();
                renderLaps();
                
                startBtn.disabled = false;
                stopBtn.disabled = true;
                lapBtn.disabled = true;
            }

            // Record a lap
            function recordLap() {
                if (!running) {
                    alert('Start the stopwatch first!');
                    return;
                }
                
                // Get current total time
                const currentTime = getCurrentTime();
                
                // Calculate lap time (difference from last lap)
                let lapTime;
                if (lastLapTime === 0) {
                    // First lap - time from start
                    lapTime = currentTime;
                } else {
                    // Subsequent laps - time since last lap
                    lapTime = currentTime - lastLapTime;
                }
                
                // Format lap time
                const formattedLapTime = formatLapTime(lapTime);
                
                // Get existing laps from localStorage
                let laps = [];
                try {
                    const stored = localStorage.getItem('stopwatch_laps');
                    if (stored) {
                        laps = JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Error reading laps:', e);
                }
                
                // Add new lap
                laps.push(formattedLapTime);
                
                // Save to localStorage
                try {
                    localStorage.setItem('stopwatch_laps', JSON.stringify(laps));
                } catch (e) {
                    console.error('Error saving laps:', e);
                }
                
                // Update last lap time
                lastLapTime = currentTime;
                lapCount++;
                
                // Render laps
                renderLaps();
            }

            // Render laps from localStorage
            function renderLaps() {
                let laps = [];
                try {
                    const stored = localStorage.getItem('stopwatch_laps');
                    if (stored) {
                        laps = JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Error reading laps:', e);
                }
                
                lapList.innerHTML = '';
                
                if (!laps || laps.length === 0) {
                    lapList.innerHTML = '<li class="empty-lap">— no laps recorded —</li>';
                    return;
                }
                
                // Display laps in reverse order (newest first)
                for (let i = laps.length - 1; i >= 0; i--) {
                    const li = document.createElement('li');
                    li.className = 'lap-item';
                    
                    const numberSpan = document.createElement('span');
                    numberSpan.className = 'lap-number';
                    numberSpan.textContent = `Lap ${i + 1}`;
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'lap-time';
                    timeSpan.textContent = laps[i];
                    
                    li.appendChild(numberSpan);
                    li.appendChild(timeSpan);
                    lapList.appendChild(li);
                }
            }

            // Initialize
            function init() {
                // Check if there are saved laps
                let laps = [];
                try {
                    const stored = localStorage.getItem('stopwatch_laps');
                    if (stored) {
                        laps = JSON.parse(stored);
                    }
                } catch (e) {
                    console.error('Error reading laps:', e);
                }
                
                // Render laps if any exist
                if (laps && laps.length > 0) {
                    renderLaps();
                }
                
                // Reset timer display
                elapsedTime = 0;
                lastLapTime = 0;
                updateDisplay();
                
                // Set button states
                startBtn.disabled = false;
                stopBtn.disabled = true;
                lapBtn.disabled = true;
            }

            // Event listeners
            startBtn.addEventListener('click', startStopwatch);
            stopBtn.addEventListener('click', stopStopwatch);
            resetBtn.addEventListener('click', resetStopwatch);
            lapBtn.addEventListener('click', recordLap);

            // Initialize
            init();
        })();
    </script>
</body>
</html>
